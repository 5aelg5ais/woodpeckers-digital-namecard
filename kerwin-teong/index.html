<script>
        // This variable must match the filename generated by your Python script
        const vcardFile = "contact.vcf";

        function triggerDownload() {
            const link = document.createElement('a');
            link.href = vcardFile;
            link.download = vcardFile;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Trigger 1: The Red Button Click
        const btn = document.getElementById('downloadBtn');
        if (btn) {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                triggerDownload();
            });
        }

        // Trigger 2: Automatic Download on Page Load
        // We use a 1-second delay to ensure the UI renders and 
        // to avoid being flagged as a "malicious" immediate download by mobile browsers.
        window.addEventListener('load', () => {
            setTimeout(triggerDownload, 1000);
        });
    </script>
