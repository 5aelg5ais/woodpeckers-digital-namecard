<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Download Example</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --overlay-bg: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8fafc;
        }

        /* Main Download Button */
        .trigger-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .trigger-btn:hover {
            background-color: #1d4ed8;
        }

        .trigger-btn:active {
            transform: scale(0.98);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .modal-actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-confirm { background: var(--primary-color); color: white; }
        .btn-cancel { background: #e2e8f0; color: #475569; }
    </style>
</head>
<body>

    <button class="trigger-btn" onclick="toggleModal(true)">
        Download Project Assets (.zip)
    </button>

    <div id="downloadModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Confirm Download</h3>
            <p>You are about to download <strong>Project_Assets.zip</strong> (45 MB). Would you like to proceed?</p>
            
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="toggleModal(false)">Cancel</button>
                <button class="btn btn-confirm" onclick="startDownload()">Download Now</button>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('downloadModal');
        const fileUrl = 'https://example.com/files/project.zip'; // Replace with your actual file path
        const fileName = 'Project_Assets.zip';

        function toggleModal(show) {
            modal.style.display = show ? 'flex' : 'none';
        }

        function startDownload() {
            // 1. Hide the modal
            toggleModal(false);

            // 2. Create an invisible link and trigger it
            const link = document.createElement('a');
            link.href = fileUrl;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            
            // 3. Clean up
            document.body.removeChild(link);
            
            console.log("Download initiated for:", fileName);
        }

        // Close modal if user clicks the dark background
        window.onclick = function(event) {
            if (event.target == modal) {
                toggleModal(false);
            }
        }
    </script>

</body>
</html>
